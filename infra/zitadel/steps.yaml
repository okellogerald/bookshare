# Zitadel initialization steps
# This configures the default instance on first start
#
# After Zitadel starts, you will need to:
# 1. Log in to the Zitadel console at http://localhost:8085
# 2. Create a Project called "Bookshare"
# 3. Create one Application:
#    - "Bookshare Web" (Web app, PKCE/Authorization Code, redirect: http://localhost:3334/api/auth/callback)
#
# The steps below configure the default admin user.

FirstInstance:
  Org:
    Human:
      UserName: "admin@bookshare.local"
      Profile:
        FirstName: "Bookshare"
        LastName: "Admin"
      Password: "Bookshare-Admin-2024!"
  InstanceName: "Bookshare"
  DefaultLanguage: "en"
