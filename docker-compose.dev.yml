services:
  # ─── Database ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bookshare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookshare_dev}
      POSTGRES_DB: bookshare
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookshare}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Authentication ───────────────────────────────────────────
  zitadel-proxy:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --ping=true
      - --ping.entrypoint=web
    ports:
      - "8085:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      zitadel:
        condition: service_healthy
      zitadel-login:
        condition: service_healthy

  zitadel:
    image: ghcr.io/zitadel/zitadel:latest
    restart: unless-stopped
    user: "0"
    command: start-from-init --masterkeyFile /masterkey --tlsMode disabled --steps /steps.yaml
    environment:
      ZITADEL_PORT: 8080
      ZITADEL_TLS_ENABLED: false
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${POSTGRES_USER:-bookshare}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${POSTGRES_PASSWORD:-bookshare_dev}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${POSTGRES_USER:-bookshare}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD:-bookshare_dev}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALSECURE: ${ZITADEL_EXTERNALSECURE:-false}
      ZITADEL_EXTERNALPORT: ${ZITADEL_EXTERNALPORT:-8085}
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_EXTERNALDOMAIN:-localhost}
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel/bootstrap/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Automatically Initialized IAM_LOGIN_CLIENT
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: "2030-01-01T00:00:00Z"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: true
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: http://localhost:8085/ui/v2/login/
      ZITADEL_OIDC_DEFAULTLOGINURLV2: http://localhost:8085/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: http://localhost:8085/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_SAML_DEFAULTLOGINURLV2: http://localhost:8085/ui/v2/login/login?samlRequest=
    volumes:
      - ./infra/zitadel/masterkey:/masterkey:ro
      - ./infra/zitadel/steps.yaml:/steps.yaml:ro
      - zitadel_bootstrap:/zitadel/bootstrap
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.services.zitadel-api.loadbalancer.server.port=8080
      - traefik.http.services.zitadel-api.loadbalancer.server.scheme=h2c
      - traefik.http.routers.zitadel-api.rule=Host(`localhost`)
      - traefik.http.routers.zitadel-api.entrypoints=web
      - traefik.http.routers.zitadel-api.service=zitadel-api
      - traefik.http.routers.zitadel-api.priority=10

  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:latest
    restart: unless-stopped
    user: "0"
    environment:
      ZITADEL_API_URL: http://zitadel:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      CUSTOM_REQUEST_HEADERS: Host:localhost,X-Forwarded-Proto:http
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/ui/v2/login/healthy').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    volumes:
      - zitadel_bootstrap:/zitadel/bootstrap:ro
    depends_on:
      zitadel:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.services.zitadel-login.loadbalancer.server.port=3000
      - traefik.http.middlewares.zitadel-root-rewrite.replacepath.path=/ui/v2/login/
      - traefik.http.routers.zitadel-root.rule=Host(`localhost`) && Path(`/`)
      - traefik.http.routers.zitadel-root.entrypoints=web
      - traefik.http.routers.zitadel-root.middlewares=zitadel-root-rewrite
      - traefik.http.routers.zitadel-root.service=zitadel-login
      - traefik.http.routers.zitadel-root.priority=400
      - traefik.http.routers.zitadel-login.rule=Host(`localhost`) && PathPrefix(`/ui/v2/login`)
      - traefik.http.routers.zitadel-login.entrypoints=web
      - traefik.http.routers.zitadel-login.service=zitadel-login
      - traefik.http.routers.zitadel-login.priority=250

  # ─── Read API (PostgREST) ─────────────────────────────────────
  postgrest:
    image: postgrest/postgrest:latest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgresql://postgrest_authenticator:postgrest_dev@postgres:5432/bookshare
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: postgrest_auth
      PGRST_JWT_SECRET: ${ZITADEL_JWT_SECRET:-}
      PGRST_JWT_SECRET_IS_BASE64: "false"
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3336
      PGRST_DB_MAX_ROWS: 1000
      PGRST_DB_PRE_REQUEST: public.pgrst_auth_guard
      # Use Zitadel's JWKS endpoint for JWT verification
      PGRST_JWT_AUD: ""
      PGRST_JWT_ROLE_CLAIM_KEY: ".role"
    ports:
      - "3336:3000"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Object Storage ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bookshare}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bookshare_dev}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    entrypoint: /bin/sh /init.sh
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bookshare}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bookshare_dev}
      MINIO_BUCKET: ${MINIO_BUCKET_DEV:-bookshare-media-dev}
    volumes:
      - ./infra/minio/init.sh:/init.sh:ro
    depends_on:
      minio:
        condition: service_healthy

  # ─── API (NestJS) ────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    restart: unless-stopped
    environment:
      PORT: 3333
      DATABASE_URL: postgresql://${POSTGRES_USER:-bookshare}:${POSTGRES_PASSWORD:-bookshare_dev}@postgres:5432/bookshare
      ZITADEL_ISSUER: ${ZITADEL_ISSUER_URL:-http://localhost:8085}
      ZITADEL_ISSUER_INTERNAL: ${ZITADEL_ISSUER_INTERNAL:-http://zitadel:8080}
      ZITADEL_EXTERNAL_URL: ${ZITADEL_EXTERNAL_URL:-http://localhost:8085}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-bookshare}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-bookshare_dev}
      MINIO_BUCKET: ${MINIO_BUCKET_DEV:-bookshare-media-dev}
      PUBLIC_MINIO_URL: ${PUBLIC_MINIO_URL:-http://localhost:9002}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3334}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SUBMISSIONS_EMAIL_TO: ${SUBMISSIONS_EMAIL_TO:-}
    ports:
      - "3333:3333"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/db/src:/app/packages/db/src
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Web (Next.js) ───────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    restart: unless-stopped
    environment:
      PORT: 3334
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:3333/api}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:3333/api}
      POSTGREST_INTERNAL_URL: ${POSTGREST_INTERNAL_URL:-http://postgrest:3000}
      NEXT_PUBLIC_POSTGREST_URL: ${PUBLIC_POSTGREST_URL:-http://localhost:3336}
      NEXT_PUBLIC_ZITADEL_URL: ${PUBLIC_ZITADEL_URL:-http://localhost:8085}
      ZITADEL_ISSUER_URL: ${ZITADEL_ISSUER_URL:-http://localhost:8085}
      ZITADEL_INTERNAL_URL: ${ZITADEL_INTERNAL_URL:-http://zitadel-proxy}
      ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID:-}
      NEXT_PUBLIC_MINIO_URL: ${PUBLIC_MINIO_URL:-http://localhost:9002}
    ports:
      - "3334:3334"
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./packages/shared/src:/app/packages/shared/src
    depends_on:
      - api

  # ─── Workflows (Motia) ───────────────────────────────────────
  workflows:
    build:
      context: .
      dockerfile: apps/workflows/Dockerfile.dev
    restart: unless-stopped
    environment:
      PORT: 3335
      DATABASE_URL: postgresql://${POSTGRES_USER:-bookshare}:${POSTGRES_PASSWORD:-bookshare_dev}@postgres:5432/bookshare
      API_URL: http://api:3333/api
    ports:
      - "3335:3335"
    volumes:
      - ./apps/workflows/steps:/app/apps/workflows/steps
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/db/src:/app/packages/db/src
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  zitadel_bootstrap:
